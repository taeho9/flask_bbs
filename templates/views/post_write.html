<!DOCTYPE html>
<head>
	<!-- Bootstrap core CSS -->
	<link rel="stylesheet" type="text/css" href="/static/css/bootstrap.min.css">
	<!-- CKEditor 5-->
	<script src="/static/ckeditor5/ckeditor.js"></script>
	<script src="/static/ckeditor5/MyUploadAdapter.js"></script>
	<style>
		.ck-editor__editable {
			min-height: 300px;
		}
	</style>
</head>
<body>
	<div class="container">
		<h3>포스트 작성하기</h3>
			<form name="frm_pw" method="POST" action="post_write">
			<div class="form-group">
				<label for="title">제목</label>
				<input type="text" name="subject" class="form-control" placeholder="제목을 입력하세요">
			</div>
			<div class="form-group">
				<label for="content">내용</label>
				<textarea name="contents" id="editor" class="form-control"></textarea>
					<script>
						function MyCustomUploadAdapterPlugin( editor ) {
    						editor.plugins.get( 'FileRepository' ).createUploadAdapter = ( loader ) => {
        					return new MyUploadAdapter( loader );
    						};
						}
						ClassicEditor
							.create( document.querySelector( '#editor' ), {
								language: { ui: 'ko', content: 'ko' },
								extraPlugins: [MyCustomUploadAdapterPlugin]
							} )
							.catch( error => {
								console.error( error );
							} );
					</script>
			</div>
			<input type="submit" value="저장하기" class="btn btn-primary">
		</form>
	</div>
	</body>
</html>
