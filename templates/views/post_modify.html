<!DOCTYPE html>
<head>
	<!-- Bootstrap core CSS -->
	<link rel="stylesheet" type="text/css" href="/static/css/bootstrap.min.css">
	<!-- CKEditor 5-->
	<script src="/static/ckeditor5/ckeditor.js"></script>
	<style>
		.ck-editor__editable {
			min-height: 300px;
		}
	</style>
</head>
<body>
	<div class="container">
		<h3>포스트 수정하기</h3>
			<form name="frm_pm" method="POST" action="/post_modify/{{post.id}}">
			<div class="form-group">
				<label for="subject">제목</label>
				<input type="text" name="subject" class="form-control" value="{{post.subject}}">
				<label for="content">내용</label>
				<textarea name="contents" id="editor" class="form-control" rows="5">{{post.content}}</textarea>
				<script>
					ClassicEditor
						.create( document.querySelector( '#editor' ), {
							language: { ui: 'ko', content: 'ko' }
						} )
						.catch( error => {
							console.error( error );
						} );
				</script>
				<input type="submit" value="수정하기" class="btn-primary">
			</div>
		</form>
	</div>
	</body>
</html>
